<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntroduceIrfan</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/static/style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/image/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/image/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/image/icon/favicon-16x16.png">
</head>
<body>
    <nav>
        <a href="../index.html" style="text-decoration: none;">
            <div class="nav-logo" id="navLogo">
                <img src="../assets/image/notion_smile.png" class="nav-avatar" id="navFace" alt="avatar">
                Introduce Irfan
            </div>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html" >Home</a></li>
            <li><a href="projects.html" class="active-page">What I Do?</a></li>
            <li><a href="about.html">About Me</a></li>
        </ul>
    </nav>

  <!-- CONTENT -->
  <div class="detail-wrapper" id="detailContent">
    <div class="not-found">
      <h2>Loading...</h2>
    </div>
  </div>

  <footer class="footer-right">
    <p>&copy; 2026 Febrian Naufal Irfansyah</p>

    <div class="footer-icons">
        <a href="https://instagram.com/introduceirfan" target="_blank" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://www.linkedin.com/in/febriannaufalirfansyah/" target="_blank" title="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/Introduceirfan" target="_blank" title="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </div>

  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');

    fetch('../data/projects.json')
      .then(res => res.json())
      .then(projects => {
        const project = projects.find(p => p.id === projectId);
        const container = document.getElementById('detailContent');

        if (!project) {
          container.innerHTML = `
            <div class="not-found">
              <h2>Project not found</h2>
              <a href="projects.html">← Back to Projects</a>
            </div>`;
          return;
        }

        document.title = `${project.title} | Febrian Naufal Irfansyah`;

        container.innerHTML = `
          <a href="projects.html" class="detail-back">← Back to Projects</a>
          <h1 class="detail-title">${project.title}</h1>
          <p class="detail-desc">${project.description}</p>
          ${project.preview && project.preview.length > 0 ? `
            <div class="detail-slideshow">
              <button class="slide-btn slide-prev">&lsaquo;</button>
              <div class="slide-track">
                ${project.preview.map((src, i) => `
                  <img src="${src}" class="slide-img ${i === 0 ? 'active' : ''}" alt="preview ${i+1}" />
                `).join('')}
              </div>
              <button class="slide-btn slide-next">&rsaquo;</button>
            </div>
            ${project.captions ? `
              <p class="slide-caption" id="slideCaption">${project.captions[0]}</p>
            ` : ''}
          ` : `
            <img src="${project.image}" class="detail-main-img" alt="${project.title}" />
          `}
          <div class="detail-actions">
            ${project.github ? `<a href="${project.github}" target="_blank" class="detail-link">See more on GitHub →</a>` : ''}
            ${project.report ? `<a href="${project.report}" target="_blank" class="detail-link">View Report →</a>` : ''}
          </div>
        `;

        const imgs = container.querySelectorAll('.slide-img');
        const caption = container.querySelector('#slideCaption');
        let current = 0;

        container.querySelector('.slide-prev')?.addEventListener('click', () => {
          imgs[current].classList.remove('active');
          current = (current - 1 + imgs.length) % imgs.length;
          imgs[current].classList.add('active');
          if (caption && project.captions) caption.textContent = project.captions[current];
        });

        container.querySelector('.slide-next')?.addEventListener('click', () => {
          imgs[current].classList.remove('active');
          current = (current + 1) % imgs.length;
          imgs[current].classList.add('active');
          if (caption && project.captions) caption.textContent = project.captions[current];
        });
      });
</script>
</body>
</html>
