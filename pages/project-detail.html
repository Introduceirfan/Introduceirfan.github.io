<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project | Febrian Naufal Irfansyah</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/css/glightbox.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/static/style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/image/icon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/image/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/image/icon/favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <style>
    .detail-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 120px 5% 6rem;
    }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #a0a0a0;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .detail-back:hover {
      color: #4ade80;
    }

    .detail-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
      padding: 0.3rem 0.75rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .detail-title {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .detail-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .detail-stack span {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #c0c0c0;
    }

    .detail-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #1f1f1f, #141414);
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: rgba(74, 222, 128, 0.2);
      margin-bottom: 2rem;
    }

    .detail-section {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .detail-section-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #222;
      background: rgba(255, 255, 255, 0.02);
    }

    .detail-section-header i {
      font-size: 1rem;
      color: #4ade80;
    }

    .detail-section-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
    }

    .detail-section-body {
      padding: 1.5rem;
    }

    .detail-section-body p {
      font-size: 0.95rem;
      color: #c0c0c0;
      line-height: 1.75;
    }

    .detail-highlights {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .detail-highlights li {
      font-size: 0.95rem;
      color: #c0c0c0;
      line-height: 1.7;
      padding-left: 1.5rem;
      position: relative;
    }

    .detail-highlights li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #4ade80;
      font-weight: bold;
    }

    .detail-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .not-found {
      text-align: center;
      padding: 6rem 2rem;
      color: #a0a0a0;
    }

    .not-found h2 {
      font-family: 'Sora', sans-serif;
      font-size: 2rem;
      color: #ffffff;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">Introduce Irfan</div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../pages/projects.html" class="active">Projects</a></li>
      <li><a href="../pages/journey.html">My Journey</a></li>
      <li><a href="../pages/about.html">About Me!</a></li>
    </ul>
  </nav>

  <!-- CONTENT -->
  <div class="detail-wrapper" id="detailContent">
    <div class="not-found">
      <h2>Loading...</h2>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Febrian Naufal Irfansyah</p>
  </footer>

  <script>
    // Nav toggle
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

    // Get project id from URL
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');

    // Fetch and render
    fetch('../data/projects.json')
      .then(res => res.json())
      .then(projects => {
        const project = projects.find(p => p.id === projectId);
        const container = document.getElementById('detailContent');

        if (!project) {
          container.innerHTML = `
            <div class="not-found">
              <h2>Project not found</h2>
              <p>Hmm, project ini kayaknya belum ada.</p>
              <br>
              <a href="projects.html" class="btn-primary">← Back to Projects</a>
            </div>`;
          return;
        }

        
        // Update page title
        document.title = `${project.title} | Febrian Naufal Irfansyah`;

        // Render stack tags
        const stackHTML = project.stack.map(s => `<span>${s}</span>`).join('');

        // Render highlights
        const highlightsHTML = project.highlights.map(h => `<li>${h}</li>`).join('');
        // render preview yeah
        const previewHTML = project.preview && project.preview.length > 0
          ? `<div class="detail-section">
              <div class="detail-section-header">
                <h2>Preview</h2>
              </div>
              <div class="detail-section-body" style="display:flex; flex-direction:column; gap:1rem;">
                ${project.preview.map(src => `
                    <a href="${src}" class="glightbox">
                      <img src="${src}" style="width:100%; border-radius:10px; border:1px solid #2a2a2a; object-fit:cover;"/>
                    </a>
                      `).join('')}
              </div>
            </div>`
            : ''

        // image opener
        const thumbHTML = project.image
          ? `<img src="${project.image}" style="width:100%; border-radius:14px; border:1px solid #2a2a2a; margin-bottom:2rem; object-fit:cover;"/>`
          : `<div class="detail-thumb"><i class="${project.cardIcon}"></i></div>`;
        // Render action buttons
        const githubBtn = project.github
          ? `<a href="${project.github}" target="_blank" class="btn-primary"><i class="fa-brands fa-github"></i> View on GitHub</a>`
          : '';
        const demoBtn = project.demo
          ? `<a href="${project.demo}" target="_blank" class="btn-secondary"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo</a>`
          : '';
        const reportBtn = project.report
          ? `<a href="${project.report}" target="_blank" class="btn-secondary"><i class="fa-solid fa-file"></i> View Report</a>`
          : '';  
        container.innerHTML = `
          <a href="projects.html" class="detail-back">
            <i class="fa-solid fa-arrow-left"></i> Back to Projects
          </a>

          <span class="detail-badge">
            <i class="${project.badgeIcon}"></i> ${project.badge}
          </span>

          <h1 class="detail-title">${project.title}</h1>

          <div class="detail-stack">${stackHTML}</div>

          ${project.image 
            ? `<img src="${project.image}" style="width:100%; border-radius:14px; border:1px solid #2a2a2a; margin-bottom:2rem; object-fit:cover;"/>` 
            : `<div class="detail-thumb"><i class="${project.cardIcon}"></i></div>`
          }

          <div class="detail-section">
            <div class="detail-section-header">
              <i class="fa-solid fa-align-left"></i>
              <h2>Overview</h2>
            </div>
            <div class="detail-section-body">
              <p>${project.description}</p>
            </div>
          </div>

          <div class="detail-section">
            <div class="detail-section-header">
              <i class="fa-solid fa-star"></i>
              <h2>Content Summary</h2>
            </div>
            <div class="detail-section-body">
              <ul class="detail-highlights">${highlightsHTML}</ul>
            </div>
          </div>

           ${previewHTML}
           
          <div class="detail-actions">
            ${githubBtn}
            ${demoBtn}
            ${reportBtn}
          </div>
        `;
        if (window.lightbox) {
        window.lightbox.destroy()
        }
        window.lightbox = GLightbox({ selector: '.glightbox' })
      })
      
      .catch(() => {
        document.getElementById('detailContent').innerHTML = `
          <div class="not-found">
            <h2>Something went wrong</h2>
            <p>Gagal load project data.</p>
            <br>
            <a href="../pages/projects.html" class="btn-primary">← Back to Projects</a>
          </div>`;
      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox@3.2.0/dist/js/glightbox.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.lightbox = GLightbox({ selector: '.glightbox' })
    })
</script>
</body>
</html>
