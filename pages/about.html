<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntroduceIrfan</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/static/style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/image/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/image/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/image/icon/favicon-16x16.png">
    <link rel="manifest" href="../site.webmanifest">
</head>
<body>
    <nav>
        <a href="index.html" style="text-decoration: none;">
            <div class="nav-logo" id="navLogo">
                <img src="../assets/image/notion_smile.png" class="nav-avatar" id="navFace" alt="avatar">
                Introduce Irfan
            </div>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html" >Home</a></li>
            <li><a href="projects.html">What I Do?</a></li>
            <li><a href="about.html" class="active-page">About Me</a></li>
        </ul>
    </nav>


  <!-- ABOUT CONTENT -->
  <section class="about-section">
    <!-- intro -->
    <div class="about-intro fade-in">
      <div class="about-intro-img">
        <img src="../assets/image/notion_smiley.png" alt="irfan" />
      </div>
      <div>
        <div class="about-intro-text">
          <h2><span>Febrian Naufal Irfansyah</span></h2>
          <p>A Fresh graduate Industrial Engineering with a deep curiosity in data and technology</p>
        </div>
      </div>  
    </div>

    <!-- faq bout me -->
    <div class="faq">
      <h2 class="faq-title">FAQ</h2>
      <p class="faq-subtitle">Some things people might want to know.</p>
      <div class="faq-list" id="faqList"></div>
    </div>
  </section>

  <footer class="footer-right">
    <p>&copy; 2026 Febrian Naufal Irfansyah</p>

    <div class="footer-icons">
        <a href="https://instagram.com/introduceirfan" target="_blank" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://www.linkedin.com/in/febriannaufalirfansyah/" target="_blank" title="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/Introduceirfan" target="_blank" title="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </div>

  </footer>

  <script>
    // Mobile nav toggle
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

    // Fade-in on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    fetch('../data/faq.json')
    .then(res => res.json())
    .then(faqs => {
      const container = document.getElementById('faqList');
      container.innerHTML = faqs.map((faq, i) => `
        <div class="faq-item">
          <button class="faq-question" data-index="${i}">${faq.question}</button>
          <div class="faq-answer" id="faq-answer-${i}"><p>${faq.answer}</p></div>
        </div>
      `).join('');

      container.querySelectorAll('.faq-question').forEach(btn => {
        btn.addEventListener('click', () => {
          const index = btn.getAttribute('data-index');
          const answer = document.getElementById(`faq-answer-${index}`);
          const isOpen = btn.classList.contains('open');
          container.querySelectorAll('.faq-question').forEach(b => b.classList.remove('open'));
          container.querySelectorAll('.faq-answer').forEach(a => a.classList.remove('open'));
          if (!isOpen) { btn.classList.add('open'); answer.classList.add('open'); }
        });
      });
    });
    
  </script>

</body>
</html>
