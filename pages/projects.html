<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntroduceIrfan</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/static/style.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/image/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/image/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/image/icon/favicon-16x16.png">
</head>
<body>
    <nav>
        <a href="../index.html" style="text-decoration: none;">
            <div class="nav-logo" id="navLogo">
                <img src="../assets/image/notion_smile.png" class="nav-avatar" id="navFace" alt="avatar">
                Introduce Irfan
            </div>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html" >Home</a></li>
            <li><a href="projects.html" class="active-page">What I Do?</a></li>
            <li><a href="about.html">About Me</a></li>
        </ul>
    </nav>

    <div class="nav-overlay" id="navOverlay">
        <button class="nav-close" id="navClose">✕</button>
        <nav class="nav-overlay-links">
            <a href="../index.html">Home</a>
            <a href="projects.html">What I Do?</a>
            <a href="about.html">About Me</a>
        </nav>
    </div>

  <!-- HEADER -->
  <section class="project-header fade-in">
    <p class="projects-quote">They say, <span>"When there's a will, there's a way."</span></p>
    <h1>So I took some projects.</h1>
    <p class="project-label">Sometimes they even work. Or, well... the opposite.</p>
  </section>

  <!--Projects grid-->
  <section class="projects-section">
    <div class="projects-list" id="projectsGrid"></div>
  </section>
 
  <footer class="footer-right">
    <p>&copy; 2026 Febrian Naufal Irfansyah</p>

    <div class="footer-icons">
        <a href="https://instagram.com/introduceirfan" target="_blank" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://www.linkedin.com/in/febriannaufalirfansyah/" target="_blank" title="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/Introduceirfan" target="_blank" title="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </div>

  </footer>

  <script>
      const navToggle = document.getElementById('navToggle');
      const navOverlay = document.getElementById('navOverlay');
      const navClose = document.getElementById('navClose');

      navClose.addEventListener('click', () => {
          navOverlay.classList.remove('open');
          navToggle.classList.remove('hidden'); 
      });

      navToggle.addEventListener('click', () => {
          navOverlay.classList.add('open');
          navToggle.classList.add('hidden'); 
      });

      navOverlay.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
              navOverlay.classList.remove('open');
          });
      });
  </script>

  <script>
    fetch('../data/projects.json')
      .then(res => res.json())
      .then(projects => {
        const container = document.getElementById('projectsGrid');
        
        container.innerHTML = projects.map(p => `
          <div class="project-item fade-in">
            <div class="project-image">
              <img src="${p.image}" alt="${p.title}" />
            </div>
            <div class="project-info">
              <h3>${p.title}</h3>
              <p>${p.summary}</p>
              <a href="project-detail.html?id=${p.id}">View Project →</a>
            </div>
          </div>
        `).join('');

        container.insertAdjacentHTML('afterend', `
          <p class="projects-more">& many more that probably shouldn't see the light of day.</p>
        `);

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
          });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    });

    const faces = [
      '../assets/image/notion_smile.png',
      '../assets/image/notion_smiley.png',
    ];

    let currentFace = 0;

    const navLogoEl = document.getElementById('navLogo');
    navLogoEl.addEventListener('mouseover', () => {
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * faces.length);
      } while (newIndex === currentFace);
      currentFace = newIndex;
      document.getElementById('navFace').src = faces[currentFace];
    });

    navLogoEl.addEventListener('mouseleave', () => {
      document.getElementById('navFace').src = faces[0];
      currentFace = 0;
    });
  </script>

</body>
</html>
